<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMAN CHECKER — Bulk DA PA DR Spam Score Checker</title>
  <meta name="description" content="Free bulk domain authority checker. Check DA, PA, DR, spam score for up to 500 URLs.">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#050505 0%,#0a0a0f 100%);color:#fff;min-height:100vh}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    
    /* Header */
    header{text-align:center;padding:50px 0}
    .logo{font-size:64px;color:#D4AF37;margin-bottom:16px;text-shadow:0 0 30px rgba(212,175,55,0.5);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    h1{font-size:36px;margin-bottom:12px;background:linear-gradient(135deg,#D4AF37,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:#888;font-size:16px;max-width:600px;margin:0 auto}
    
    /* Cards */
    .card{background:linear-gradient(135deg,rgba(20,20,30,0.8),rgba(10,10,15,0.9));border:1px solid rgba(212,175,55,0.2);border-radius:16px;padding:32px;margin:24px 0;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .card:hover{border-color:rgba(212,175,55,0.4)}
    
    /* Input */
    textarea{width:100%;min-height:180px;background:rgba(0,0,0,0.5);border:1px solid rgba(212,175,55,0.3);border-radius:12px;padding:16px;color:#fff;font-family:'Monaco','Consolas',monospace;font-size:14px;resize:vertical;transition:all 0.3s}
    textarea:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 20px rgba(212,175,55,0.2)}
    textarea::placeholder{color:#555}
    
    /* Buttons */
    .btn-group{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
    .btn{background:linear-gradient(135deg,#D4AF37,#B8860B);color:#000;border:none;padding:14px 36px;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px;transition:all 0.3s;display:flex;align-items:center;gap:8px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.4)}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-secondary{background:linear-gradient(135deg,#2a2a3a,#1a1a2a);color:#D4AF37;border:1px solid rgba(212,175,55,0.3)}
    .btn-secondary:hover{background:linear-gradient(135deg,#3a3a4a,#2a2a3a)}
    
    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:24px 0}
    .stat{background:rgba(20,20,30,0.6);border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:20px;text-align:center}
    .stat-value{font-size:32px;font-weight:700;color:#D4AF37}
    .stat-label{font-size:13px;color:#666;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
    
    /* Results Table */
    .results-container{margin-top:32px;overflow-x:auto}
    .results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .results-title{font-size:20px;font-weight:600;color:#D4AF37}
    table{width:100%;border-collapse:collapse;background:rgba(10,10,15,0.5);border-radius:12px;overflow:hidden}
    thead{background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(184,134,11,0.1))}
    th{padding:16px 12px;text-align:left;font-size:12px;font-weight:700;color:#D4AF37;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(212,175,55,0.3)}
    td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
    tr:hover{background:rgba(212,175,55,0.05)}
    .domain{font-weight:600;color:#fff;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .metric{font-weight:700;font-size:14px}
    .da{color:#D4AF37}
    .pa{color:#95d5b2}
    .dr{color:#4fc3f7}
    .ss{color:#f5a5a5}
    .status{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;display:inline-block}
    .status-success{background:rgba(26,67,50,0.6);color:#95d5b2;border:1px solid rgba(149,213,178,0.3)}
    .status-error{background:rgba(92,26,26,0.6);color:#f5a5a5;border:1px solid rgba(245,165,165,0.3)}
    
    /* Loading */
    .loading{text-align:center;padding:60px 20px;color:#888}
    .loading-spinner{width:50px;height:50px;border:3px solid rgba(212,175,55,0.2);border-top-color:#D4AF37;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Error */
    .error{background:rgba(92,26,26,0.6);border:1px solid rgba(245,165,165,0.3);border-radius:12px;padding:20px;margin:20px 0;color:#f5a5a5;display:flex;align-items:center;gap:12px}
    .error-icon{font-size:24px}
    
    /* Footer */
    footer{text-align:center;padding:40px 0;color:#444;font-size:13px;border-top:1px solid rgba(255,255,255,0.05);margin-top:40px}
    footer a{color:#D4AF37;text-decoration:none}
    footer a:hover{text-decoration:underline}
    
    /* Responsive */
    @media(max-width:768px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .btn-group{flex-direction:column}
      .btn{width:100%;justify-content:center}
      h1{font-size:28px}
      .logo{font-size:48px}
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">◆</div>
      <h1>AIMAN CHECKER</h1>
      <p class="subtitle">Free Bulk DA PA DR Spam Score Checker — Check up to 500 domains at once</p>
    </header>

    <div class="card">
      <label style="display:block;margin-bottom:12px;font-weight:600;color:#D4AF37">Enter domains (one per line, max 500):</label>
      <textarea id="domains" placeholder="malcomschein.my.id&#10;example.com&#10;google.com&#10;mozilla.org"></textarea>
      <div class="btn-group">
        <button class="btn" id="checkBtn" onclick="checkDomains()">
          <span>🔍</span> Check Now
        </button>
        <button class="btn btn-secondary" id="exportBtn" onclick="exportToExcel()" style="display:none">
          <span>📊</span> Export to Excel
        </button>
        <button class="btn btn-secondary" onclick="clearAll()">
          <span>🗑️</span> Clear
        </button>
      </div>
    </div>

    <div id="stats" class="stats" style="display:none">
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Checked</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-avg-da" style="color:#D4AF37">0</div>
        <div class="stat-label">Avg DA</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-avg-pa" style="color:#95d5b2">0</div>
        <div class="stat-label">Avg PA</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-avg-ss" style="color:#f5a5a5">0</div>
        <div class="stat-label">Avg SS</div>
      </div>
    </div>

    <div id="error" class="error" style="display:none">
      <span class="error-icon">⚠️</span>
      <span id="error-msg"></span>
    </div>

    <div id="results" class="results-container"></div>

    <footer>
      <p>Powered by <strong style="color:#D4AF37">AIMAN CHECKER</strong> • Data from dachecker.io</p>
      <p style="margin-top:8px;color:#333">Built with ❤️ for SEO professionals</p>
    </footer>
  </div>

  <script>
    const SCRAPER_URL = 'https://concentrations-contain-rays-hans.trycloudflare.com';
    let lastResults = [];

    async function checkDomains() {
      const btn = document.getElementById('checkBtn');
      const exportBtn = document.getElementById('exportBtn');
      const textarea = document.getElementById('domains');
      const resultsDiv = document.getElementById('results');
      const errorDiv = document.getElementById('error');
      const statsDiv = document.getElementById('stats');

      const urls = textarea.value.split('\n').map(u => u.trim()).filter(u => u);
      if (!urls.length) {
        showError('Please enter at least one domain');
        return;
      }
      if (urls.length > 500) {
        showError('Maximum 500 domains allowed');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> Analyzing...';
      exportBtn.style.display = 'none';
      errorDiv.style.display = 'none';
      statsDiv.style.display = 'none';
      resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Checking ' + urls.length + ' domains...</div>';
      lastResults = [];

      try {
        const response = await fetch(`${SCRAPER_URL}/check`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls })
        });

        if (!response.ok) throw new Error('Server error: ' + response.status);

        const data = await response.json();
        
        if (!data.success || !data.results) throw new Error('Invalid response from server');

        lastResults = data.results;
        renderResults(data.results);
        renderStats(data.results);
        exportBtn.style.display = 'flex';
      } catch (err) {
        showError('Failed: ' + err.message);
        resultsDiv.innerHTML = '';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>🔍</span> Check Now';
      }
    }

    function renderStats(results) {
      const valid = results.filter(r => r.domain_authority > 0);
      if (!valid.length) return;

      const avgDA = Math.round(valid.reduce((a,b) => a + (b.domain_authority||0), 0) / valid.length);
      const avgPA = Math.round(valid.reduce((a,b) => a + (b.page_authority||0), 0) / valid.length);
      const avgSS = Math.round(valid.reduce((a,b) => a + (b.spam_score||0), 0) / valid.length);

      document.getElementById('stat-total').textContent = results.length;
      document.getElementById('stat-avg-da').textContent = avgDA;
      document.getElementById('stat-avg-pa').textContent = avgPA;
      document.getElementById('stat-avg-ss').textContent = avgSS;
      document.getElementById('stats').style.display = 'grid';
    }

    function renderResults(results) {
      const resultsDiv = document.getElementById('results');
      
      const html = `
        <div class="results-header">
          <div class="results-title">📊 Results (${results.length} domains)</div>
        </div>
        <table>
          <thead>
                    <tr>
                      <th>Domain</th>
                      <th>DA</th>
                      <th>PA</th>
                      <th>SS</th>
                      <th>DR</th>
                      <th>Status</th>
                    </tr>
                  </thead>
          <tbody>
            ${results.map(r => {
                          const status = r.status === 'success' || r.domain_authority > 0 ? '✓ Success' : '✗ Failed';
                          const statusColor = status.includes('Success') ? '#95d5b2' : '#f5a5a5';
                          const dr = r.domain_rating !== undefined && r.domain_rating !== null && r.domain_rating !== '' ? r.domain_rating : 0;
                          return `
                            <tr>
                              <td class="domain">${r.domain}</td>
                              <td class="metric da">${r.domain_authority}</td>
                              <td class="metric pa">${r.page_authority}</td>
                              <td class="metric ss">${r.spam_score}</td>
                              <td class="metric dr">${dr}</td>
                              <td style="color:${statusColor}">${status}</td>
                            </tr>
                          `;
                        }).join('')}
          </tbody>
        </table>
      `;
      
      resultsDiv.innerHTML = html;
    }

    function exportToExcel() {
      if (!lastResults.length) return;

      const headers = ['Domain', 'DA', 'PA', 'SS', 'DR', 'Status'];
      const rows = lastResults.map(r => {
        const dr = r.domain_rating !== undefined && r.domain_rating !== null && r.domain_rating !== '' ? r.domain_rating : 0;
        const status = r.status === 'success' || r.domain_authority > 0 ? 'Success' : 'Failed';
        return [
          r.domain,
          r.domain_authority,
          r.page_authority,
          r.spam_score !== undefined ? r.spam_score : 0,
          dr,
          status
        ];
      });

      const csv = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `aiman-checker-${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }

    function showError(msg) {
      const errorDiv = document.getElementById('error');
      document.getElementById('error-msg').textContent = msg;
      errorDiv.style.display = 'flex';
    }

    function clearAll() {
      document.getElementById('domains').value = '';
      document.getElementById('results').innerHTML = '';
      document.getElementById('stats').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('exportBtn').style.display = 'none';
      lastResults = [];
    }

    // Auto-check from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const url = urlParams.get('url');
    if (url) {
      document.getElementById('domains').value = url;
      checkDomains();
    }
  </script>
</body>
</html>
