<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Aiman Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0d; --panel:#141417; --panel-2:#1b1b20; --line:#26262d;
    --ink:#ecece8; --muted:#8a8a92; --faint:#5a5a62;
    --gold:#c9a35b; --gold-2:#e6c478; --gold-deep:#9c7b3a;
    --green:#7fc8a0; --red:#e08a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;line-height:1.5;display:flex;align-items:center;justify-content:center;
    background-image:radial-gradient(900px 500px at 78% -8%,rgba(201,163,91,.10),transparent 60%);
  }
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:38px 34px;
    width:100%;max-width:400px;margin:20px;
  }
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.02em;font-size:18px;margin-bottom:28px}
  .brand a{color:inherit;text-decoration:none;display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--gold-2),var(--gold-deep));color:#1a1408;font-weight:800;font-size:16px;
    box-shadow:0 4px 14px rgba(201,163,91,.30)}
  .brand b{color:var(--gold-2)}
  h1{font-size:22px;letter-spacing:-.02em;margin-bottom:6px}
  .lead{color:var(--muted);font-size:14px;margin-bottom:26px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:7px;margin-top:14px}
  input{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:13px 14px;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:14px;
    transition:border-color .2s,box-shadow .2s;
  }
  input:focus{outline:none;border-color:var(--gold-deep);box-shadow:0 0 0 3px rgba(201,163,91,.12)}
  .btn{
    width:100%;font-family:inherit;font-weight:700;font-size:14.5px;border:none;border-radius:11px;
    padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(140deg,var(--gold-2),var(--gold-deep));color:#1a1408;
    box-shadow:0 6px 20px rgba(201,163,91,.25);margin-top:22px;transition:transform .15s,box-shadow .2s;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(201,163,91,.35)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .err{
    background:rgba(224,138,138,.08);border:1px solid rgba(224,138,138,.3);color:var(--red);
    border-radius:10px;padding:11px 13px;margin-top:14px;font-size:13px;display:none;
  }
  .err.on{display:block}
  .ok{
    background:rgba(127,200,160,.08);border:1px solid rgba(127,200,160,.3);color:var(--green);
    border-radius:10px;padding:11px 13px;margin-top:14px;font-size:13px;display:none;
  }
  .ok.on{display:block}
  .back{display:block;text-align:center;margin-top:22px;color:var(--faint);text-decoration:none;font-size:13px}
  .back:hover{color:var(--gold-2)}
  .note{
    background:rgba(201,163,91,.06);border:1px solid rgba(201,163,91,.2);
    border-radius:10px;padding:11px 13px;margin-top:14px;font-size:12.5px;color:var(--muted);
  }
  .note b{color:var(--gold-2)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><a href="/"><span class="mark">A</span>aiman<b>checker</b></a></div>
    <h1>Private access</h1>
    <p class="lead">Login untuk unlock 100 domain per run dan unlimited daily quota.</p>

    <form id="loginForm">
      <label for="user">Username</label>
      <input id="user" name="user" autocomplete="username" autocapitalize="none" autocorrect="off" required>

      <label for="pass">Password</label>
      <input id="pass" name="pass" type="password" autocomplete="current-password" required>

      <button class="btn" id="btn" type="submit">Sign in</button>

      <div class="err" id="err"></div>
      <div class="ok" id="ok"></div>
    </form>

    <a class="back" href="/">← Back to home</a>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const form = $('loginForm');
  const err = $('err');
  const ok = $('ok');
  const btn = $('btn');

  // Already logged in? bounce to checker
  fetch('/me', { credentials: 'include' }).then(r=>r.json()).then(d=>{
    if (d.logged_in) {
      ok.textContent = `Already signed in as ${d.user}. Redirecting…`;
      ok.classList.add('on');
      setTimeout(()=>location.href='/checker', 800);
    }
  }).catch(()=>{});

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    err.classList.remove('on');
    ok.classList.remove('on');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try{
      const res = await fetch('/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ user: $('user').value.trim(), pass: $('pass').value })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        err.textContent = data.error || 'Login failed';
        err.classList.add('on');
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      ok.textContent = `Signed in as ${data.user}. Redirecting…`;
      ok.classList.add('on');
      setTimeout(()=>location.href='/checker', 700);
    }catch(ex){
      err.textContent = 'Network error: ' + ex.message;
      err.classList.add('on');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
